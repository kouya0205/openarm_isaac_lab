# Smoke test: dummy leader + Isaac Sim + dataset recorder.
# Run from repo root: ./scripts/data_collection/run_dummy.sh

nodes:
  - id: ui
    build: pip install -e nodes/dora-openarm-data-collection-ui --no-deps
    path: dora-openarm-data-collection-ui
    env:
      METADATA_FILE: "metadata_isaac.yaml"
    inputs:
      tick: dora/timer/secs/1
    outputs:
      - command

  - id: quittable-tick-leader
    build: pip install -e nodes/dora-openarm-quitter --no-deps
    path: dora-openarm-quitter
    inputs:
      command: ui/command
      tick: dora/timer/millis/4
    outputs:
      - tick

  - id: leader
    build: pip install -e nodes/dora-openarm-dummy-ker --no-deps
    path: dora-openarm-dummy-ker
    inputs:
      tick: quittable-tick-leader/tick
    outputs:
      - position_right
      - position_left
      - follower_position_right
      - follower_position_left
      - joystick_x
      - joystick_y
      - joystick_button

  # ── Isaac Sim (replaces mujoco-collect) ──────────────────────────────────────
  - id: isaac-collect
    build: pip install -e nodes/dora-openarm-isaac -c constraints/isaaclab-dora.txt
    path: dora-openarm-isaac
    args: "--headless --enable_cameras --render"
    inputs:
      position_right: leader/follower_position_right
      position_left: leader/follower_position_left
    outputs:
      - status
      - arm_right_observation
      - arm_left_observation
      - camera_wrist_right
      - camera_wrist_left
      - camera_head_left
      - camera_head_right
      - camera_ceiling

  - id: recorder
    build: pip install -e nodes/dora-openarm-dataset-recorder --no-deps
    path: dora-openarm-dataset-recorder
    env:
      METADATA_FILE: "metadata_isaac.yaml"
      DIRECTORY: "dummy_isaac_data"
    inputs:
      command: ui/command
      arm_right_action: leader/follower_position_right
      arm_right_observation: isaac-collect/arm_right_observation
      arm_left_action: leader/follower_position_left
      arm_left_observation: isaac-collect/arm_left_observation
      camera_wrist_right: isaac-collect/camera_wrist_right
      camera_wrist_left: isaac-collect/camera_wrist_left
      camera_head_left: isaac-collect/camera_head_left
      camera_head_right: isaac-collect/camera_head_right
      camera_ceiling: isaac-collect/camera_ceiling
