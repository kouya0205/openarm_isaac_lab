# VR teleoperation dataflow with Isaac Sim replacing MuJoCo.
# Run from repo root: ./scripts/data_collection/run_vr.sh

nodes:
  - id: ui
    build: bash scripts/data_collection/pip.sh install -e nodes/dora-openarm-data-collection-ui --no-deps
    path: dora-openarm-data-collection-ui
    env:
      METADATA_FILE: "metadata_isaac.yaml"
    inputs:
      tick: dora/timer/secs/1
      button_a:
        source: udp-receiver/button_a
        queue_size: 100
      button_b:
        source: udp-receiver/button_b
        queue_size: 100
    outputs:
      - command

  - id: quittable-tick-leader
    build: bash scripts/data_collection/pip.sh install -e nodes/dora-openarm-quitter --no-deps
    path: dora-openarm-quitter
    inputs:
      command: ui/command
      tick: dora/timer/millis/2
    outputs:
      - tick

  - id: udp-receiver
    build: bash scripts/data_collection/pip.sh install -e nodes/dora-openarm-vr --no-deps
    path: dora-openarm-quest-receiver
    args: "--host 0.0.0.0 --port 5006"
    inputs:
      tick: quittable-tick-leader/tick
    outputs:
      - pose_right
      - trigger_right
      - pose_left
      - trigger_left
      - joystick_y
      - button_a
      - button_b
      - status

  - id: ik
    build: bash scripts/data_collection/pip.sh install -e nodes/dora-openarm-kinematics --no-deps
    path: dora-openarm-ik
    args: "--mode bimanual --max-iters 10 --dt 0.1 --damping 0.1 --posture-cost 0.01 --lm-damping 0.01"
    inputs:
      tick: quittable-tick-leader/tick
      target_right: udp-receiver/pose_right
      target_left: udp-receiver/pose_left
      trigger_right: udp-receiver/trigger_right
      trigger_left: udp-receiver/trigger_left
    outputs:
      - position_left
      - position_right
      - status

  # ── Isaac Sim (replaces mujoco-collect) ──────────────────────────────────────
  - id: isaac-collect
    build: bash scripts/data_collection/pip.sh install -e nodes/dora-openarm-isaac -c constraints/isaaclab-dora.txt
    path: dora-openarm-isaac
    args: "--headless --enable_cameras --render"
    env:
      ISAACLAB_PATH: "/workspace/isaaclab"
    inputs:
      position_left: ik/position_left
      position_right: ik/position_right
      pose_right: udp-receiver/pose_right
      pose_left: udp-receiver/pose_left
      joystick_y: udp-receiver/joystick_y
    outputs:
      - status
      - arm_right_observation
      - arm_left_observation
      - camera_wrist_right
      - camera_wrist_left
      - camera_head_left
      - camera_head_right
      - camera_ceiling

  - id: recorder
    build: bash scripts/data_collection/pip.sh install -e nodes/dora-openarm-dataset-recorder --no-deps
    path: dora-openarm-dataset-recorder
    env:
      METADATA_FILE: "metadata_isaac.yaml"
      DIRECTORY: "vr_isaac_data"
    inputs:
      command: ui/command
      arm_right_action: ik/position_right
      arm_right_observation: isaac-collect/arm_right_observation
      arm_left_action: ik/position_left
      arm_left_observation: isaac-collect/arm_left_observation
      camera_wrist_right: isaac-collect/camera_wrist_right
      camera_wrist_left: isaac-collect/camera_wrist_left
      camera_head_left: isaac-collect/camera_head_left
      camera_head_right: isaac-collect/camera_head_right
      camera_ceiling: isaac-collect/camera_ceiling
